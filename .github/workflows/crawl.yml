name: Polaris ORM Crawler

on:
  schedule:
    - cron: '*/30 * * * *' # Runs every 30 minutes
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml anthropic

      - name: Run ORM Crawler
        run: python crawler.py
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}

      - name: Commit crawled data
        run: |
          git config user.name "Polaris ORM Bot"
          git config user.email "orm@polariscampus.com"
          
          # Create data directory if it doesn't exist
          mkdir -p data
          
          git add data/*.json || echo "No JSON files to add"
          
          if git diff --staged --quiet; then
            echo "No new data changes this run"
          else
            # Extract BPS score for commit message using a safe one-liner
            BPS=$(python3 -c "import json, os; path='data/summary.json'; d=json.load(open(path)) if os.path.exists(path) else {}; bps=d.get('bps',{}); print(f\"{bps.get('bps','?')}/100 ({bps.get('grade','?')}) | {d.get('total_mentions','?')} mentions\")" 2>/dev/null || echo "Data Updated")
            
            git commit -m "ORM: ${BPS} - $(date -u +'%H:%M %d %b UTC')"
            git push
          fi
