name: ORM Crawler

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --upgrade pip

      - name: Run crawler
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/crawler.py

      - name: Push data
        run: |
          git config --global user.name "orm-bot"
          git config --global user.email "orm-bot@github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update ORM data [skip ci]"
          git push
