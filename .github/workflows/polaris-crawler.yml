name: Polaris ORM Crawler

on:
  schedule:
    - cron: '0 0,3,6,9,12,15,18,21 * * *'
    - cron: '30 1,4,7,10,13,16,19,22 * * *'
  workflow_dispatch:
    inputs:
      force_full:
        description: 'Force full crawl'
        required: false
        default: 'true'
  push:
    branches: [main]
    paths: ['scripts/crawler.py']

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Crawler
        run: python crawler.py
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
      - name: Commit data
        run: |
          git config user.name "Polaris ORM Bot"
          git config user.email "orm-bot@polaris.edu"
          git add data/*.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            TOTAL=$(python3 -c "import json; print(json.load(open('data/summary.json')).get('total_mentions',0))" 2>/dev/null || echo "?")
            git commit -m "ORM Crawl: ${TOTAL} mentions - $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
