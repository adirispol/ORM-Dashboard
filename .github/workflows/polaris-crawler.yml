name: Polaris ORM Crawler

on:
  schedule:
    - cron: '0 * * * *'
    - cron: '30 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['scripts/crawler.py']

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # No pip install needed — crawler uses only Python stdlib

      - name: Run ORM Crawler
        run: python scripts/crawler.py

      - name: Commit data
        run: |
          git config user.name "Polaris ORM Bot"
          git config user.email "orm@polariscampus.com"
          git add data/
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "ORM crawl $(date -u +'%H:%M %d %b')" && git push
