name: Polaris ORM Crawler

on:
  schedule:
    - cron: '0 * * * *'  # Runs every hour
    - cron: '30 * * * *' # Runs every half hour
  workflow_dispatch:      # Allows you to click "Run workflow" manually
  push:
    branches: [main]
    paths: ['scripts/crawler.py']

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas requests beautifulsoup4
          # If your script needs other libraries, add them here

      - name: Run Polaris ORM Crawler
        run: python scripts/crawler.py
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}

      - name: Commit crawled data to repo
        run: |
          git config user.name "Polaris ORM Bot"
          git config user.email "orm-bot@polaris.edu"
          git add data/*.json
          if git diff --staged --quiet; then
            echo "No new data this run"
          else
            git commit -m "ORM: Data Update — $(date -u +'%H:%M %d %b UTC')"
            git push
          fi
