name: Apify Social Crawler

on:
  schedule:
    # Runs every day at 6 AM IST (00:30 UTC)
    - cron: "30 0 * * *"
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  apify-social:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Run Apify Social Crawler
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python scripts/apify_social.py

      - name: Commit social.json
        run: |
          git config --global user.name "apify-social-bot"
          git config --global user.email "apify-bot@github.com"
          git add data/social.json
          git diff --cached --quiet || git commit -m "chore: update social.json from Apify [skip ci]"
          git push
