name: Polaris ORM — Full Crawl (Apify + Claude)

on:
  schedule:
    # Every day at 7:00 AM IST (01:30 UTC)
    # Best time: after overnight LinkedIn/Twitter activity, before work day
    - cron: "30 1 * * *"
  workflow_dispatch:
    # Manual trigger from GitHub Actions tab anytime

permissions:
  contents: write

jobs:
  full-crawl:
    name: Crawl all platforms via Apify
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unified Apify crawler
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          CLAUDE_KEY:  ${{ secrets.CLAUDE_KEY }}
        run: python scripts/apify_social.py

      - name: Commit all data files
        run: |
          git config --global user.name  "polaris-orm-bot"
          git config --global user.email "orm-bot@polariscampus.com"
          git add data/social.json data/mentions.json data/summary.json \
                  data/history.json data/trust_log.json
          git diff --cached --quiet || \
            git commit -m "crawl: $(date -u +%Y-%m-%d) — Apify+Claude [skip ci]"
          git push
