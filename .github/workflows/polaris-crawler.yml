name: Polaris ORM Crawler v8

on:
  schedule:
    - cron: '0 * * * *'   # Every hour at :00
    - cron: '30 * * * *'  # Every hour at :30
  workflow_dispatch:       # Manual trigger from Actions tab
  push:
    branches: [main]
    paths: ['scripts/crawler.py']

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run ORM Crawler
        run: python scripts/crawler.py
        env:
          # Add these in: Repo → Settings → Secrets and variables → Actions → New repository secret
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}

      - name: Commit crawled data
        run: |
          git config user.name "Polaris ORM Bot"
          git config user.email "orm@polariscampus.com"
          git add data/*.json
          if git diff --staged --quiet; then
            echo "No new data changes this run"
          else
            # Extract BPS score for commit message
            BPS=$(python3 -c "
import json
try:
    d = json.load(open('data/summary.json'))
    bps = d.get('bps',{})
    print(f\"BPS={bps.get('bps','?')}/100 ({bps.get('grade','?')}) | {d.get('total_mentions','?')} mentions\")
except:
    print('data updated')
" 2>/dev/null || echo "data updated")
            git commit -m "ORM: ${BPS} — $(date -u +'%H:%M %d %b UTC')"
            git push
          fi
