name: Polaris ORM Crawler

on:
  schedule:
    # Every 30 minutes using two cron entries (GitHub minimum is 5min)
    # Runs at :00 and :30 of every hour
    - cron: '0 * * * *'
    - cron: '30 * * * *'

  # Manual trigger — use this to test immediately
  workflow_dispatch:

  # Run when crawler script changes
  push:
    branches: [main]
    paths: ['scripts/crawler.py']

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Polaris ORM Crawler
        run: python scripts/crawler.py
        env:
          # Add these in: Repo → Settings → Secrets and variables → Actions
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}

      - name: Commit crawled data to repo
        run: |
          git config user.name "Polaris ORM Bot"
          git config user.email "orm-bot@polaris.edu"
          git add data/*.json
          if git diff --staged --quiet; then
            echo "No new data this run"
          else
            TOTAL=$(python3 -c "
import json, sys
try:
    d = json.load(open('data/summary.json'))
    ns = d.get('north_star', {})
    print(f\"{d.get('total_mentions',0)} mentions | NS={ns.get('weighted_score','?')}\")
except:
    print('?')
" 2>/dev/null || echo "?")
            git commit -m "ORM: ${TOTAL} — $(date -u +'%H:%M %d %b UTC')"
            git push
          fi
