<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polaris Live — ORM Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: #fff; }
        .glass { background: rgba(23, 23, 23, 0.7); border: 1px solid #262626; backdrop-filter: blur(12px); }
        .gold-glow { box-shadow: 0 0 50px rgba(255, 204, 63, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // CONFIGURATION: Replace with your actual IDs from the Polaris file
        const CONFIG = {
            SHEET_ID: '2PACX-1vS2u...', // Use the "Published" long ID here
            TABS: [
                { name: 'Reddit', gid: '0' },
                { name: 'Quora', gid: '2027962453' },
                { name: 'YouTube', gid: '694205561' },
                { name: 'News', gid: '143900986' },
                { name: 'Medium', gid: '1853488880' }
            ]
        };

        const Dashboard = () => {
            const [rawLogs, setRawLogs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [stats, setStats] = useState({ northStar: 0, totalMentions: 0, positive: 0 });

            useEffect(() => {
                fetchAllData();
                const interval = setInterval(fetchAllData, 60000); // Auto-refresh every minute
                return () => clearInterval(interval);
            }, []);

            const fetchAllData = async () => {
                setLoading(true);
                let combinedData = [];

                try {
                    const promises = CONFIG.TABS.map(tab => {
                        return new Promise((resolve) => {
                            Papa.parse(`https://docs.google.com/spreadsheets/d/e/${CONFIG.SHEET_ID}/pub?gid=${tab.gid}&single=true&output=csv`, {
                                download: true,
                                header: true,
                                complete: (results) => {
                                    const rows = results.data.map(r => ({ ...r, platform: tab.name }));
                                    resolve(rows);
                                }
                            });
                        });
                    });

                    const allResults = await Promise.all(promises);
                    combinedData = allResults.flat().filter(r => r.Summary || r.Title);
                    
                    // Logic to calculate North Star (e.g., % of mentions that are positive)
                    const posCount = combinedData.filter(r => r.Sentiment?.toLowerCase().includes('pos') || r.Rating > 3).length;
                    const score = combinedData.length > 0 ? Math.round((posCount / combinedData.length) * 100) : 0;

                    setStats({
                        northStar: score,
                        totalMentions: combinedData.length,
                        positive: posCount
                    });
                    setRawLogs(combinedData.slice(0, 10)); // Show latest 10
                } catch (e) {
                    console.error("Data fetch error", e);
                }
                setLoading(false);
                setTimeout(() => lucide.createIcons(), 100);
            };

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-10 space-y-8">
                    {/* Header */}
                    <div className="flex justify-between items-center border-b border-zinc-800 pb-6">
                        <div>
                            <h1 className="text-3xl font-extrabold tracking-tighter italic">POLARIS <span className="text-yellow-500 text-sm align-top">LIVE</span></h1>
                            <p className="text-zinc-500 text-xs font-medium uppercase tracking-widest mt-1">ORM Real-time Intelligence</p>
                        </div>
                        <div className="flex items-center gap-3">
                            {loading && <div className="w-2 h-2 bg-yellow-500 rounded-full animate-ping"></div>}
                            <button onClick={fetchAllData} className="glass px-4 py-2 rounded-lg text-xs font-bold hover:bg-zinc-800 transition">REFRESH</button>
                        </div>
                    </div>

                    {/* North Star Section */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2 glass p-10 rounded-[2rem] gold-glow relative overflow-hidden bg-gradient-to-br from-zinc-900 to-black">
                            <div className="relative z-10">
                                <h2 className="text-zinc-400 text-sm font-bold uppercase tracking-widest">The North Star Metric</h2>
                                <div className="flex items-baseline gap-4 mt-2">
                                    <span className="text-8xl font-black text-white leading-none">{stats.northStar}%</span>
                                    <span className="text-green-500 font-bold flex items-center gap-1"><i data-lucide="trending-up" className="w-4 h-4"></i> Stable</span>
                                </div>
                                <p className="text-zinc-500 mt-6 max-w-sm text-sm font-medium">This score represents the aggregate positive sentiment across all 6 monitored platforms.</p>
                                
                                <div className="mt-10 space-y-2">
                                    <div className="flex justify-between text-[10px] font-bold text-zinc-600 uppercase">
                                        <span>Current Performance</span>
                                        <span>Target: 95%</span>
                                    </div>
                                    <div className="w-full bg-zinc-800/50 h-3 rounded-full p-0.5">
                                        <div className="h-full bg-yellow-500 rounded-full transition-all duration-1000 shadow-[0_0_15px_rgba(234,179,8,0.4)]" style={{width: `${stats.northStar}%`}}></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="space-y-6">
                            <div className="glass p-6 rounded-2xl">
                                <span className="text-zinc-500 text-[10px] font-bold uppercase">Total Mentions</span>
                                <p className="text-3xl font-bold mt-1 text-white">{stats.totalMentions}</p>
                                <div className="mt-4 flex gap-2 overflow-hidden">
                                    {CONFIG.TABS.map(t => <div key={t.name} className="h-1 flex-1 bg-zinc-800 rounded-full overflow-hidden"><div className="h-full bg-yellow-600" style={{width: '60%'}}></div></div>)}
                                </div>
                            </div>
                            <div className="glass p-6 rounded-2xl bg-yellow-500/5 border-yellow-500/20">
                                <span className="text-yellow-500 text-[10px] font-bold uppercase tracking-widest flex items-center gap-2">
                                    <i data-lucide="zap" className="w-3 h-3"></i> Top Actionable
                                </span>
                                <p className="text-sm font-semibold text-zinc-200 mt-2">
                                    {stats.northStar < 80 ? "High Volume of Neutral Mentions detected on Reddit. Engage with FAQ updates." : "Sentiment is healthy. Focus on Review Generation."}
                                </p>
                            </div>
                        </div>
                    </div>

                    {/* Interactive Table with Live Links */}
                    <div className="glass rounded-3xl overflow-hidden">
                        <div className="p-6 border-b border-zinc-800 bg-zinc-900/30 flex justify-between items-center">
                            <h3 className="font-bold text-sm uppercase tracking-widest flex items-center gap-2">
                                <i data-lucide="list" className="w-4 h-4 text-yellow-500"></i> Platform Live Feed
                            </h3>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left">
                                <thead className="bg-black/40 text-[10px] font-black text-zinc-500 uppercase tracking-widest">
                                    <tr>
                                        <th className="px-8 py-4">Source</th>
                                        <th className="px-8 py-4">Title / Summary</th>
                                        <th className="px-8 py-4">Sentiment</th>
                                        <th className="px-8 py-4 text-right">Verification</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-zinc-800/50">
                                    {rawLogs.length > 0 ? rawLogs.map((row, i) => (
                                        <tr key={i} className="hover:bg-white/[0.02] transition-colors group">
                                            <td className="px-8 py-5">
                                                <span className="bg-zinc-800 text-zinc-400 px-3 py-1 rounded-full text-[10px] font-bold uppercase group-hover:bg-yellow-500 group-hover:text-black transition">
                                                    {row.platform}
                                                </span>
                                            </td>
                                            <td className="px-8 py-5">
                                                <p className="text-sm text-zinc-300 font-medium truncate max-w-xs">{row.Summary || row.Title || "No data"}</p>
                                            </td>
                                            <td className="px-8 py-5">
                                                <div className={`w-2 h-2 rounded-full ${row.Sentiment?.includes('Pos') ? 'bg-green-500' : 'bg-red-500'}`}></div>
                                            </td>
                                            <td className="px-8 py-5 text-right">
                                                <a href={row.Link || row.URL || "#"} target="_blank" className="text-yellow-500 hover:text-white text-xs font-bold transition flex items-center justify-end gap-1">
                                                    OPEN <i data-lucide="arrow-up-right" className="w-3 h-3"></i>
                                                </a>
                                            </td>
                                        </tr>
                                    )) : (
                                        <tr><td colSpan="4" className="p-10 text-center text-zinc-600 italic">No data found in provided GIDs</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
