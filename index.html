<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLARIS // Strategic ORM App</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root {
            --gold: #FFCC3F; --bg: #080808; --surface: #141414;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #fff; }
        .glass { background: rgba(20, 20, 20, 0.7); border: 1px solid #222; backdrop-filter: blur(20px); }
        .gold-glow { box-shadow: 0 0 40px rgba(255, 204, 63, 0.08); }
        .sidebar-active { border-left: 3px solid var(--gold); background: rgba(255,204,63,0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [sheetId, setSheetId] = useState('1z2gTk-xw-RPgZ3BbiJBX3AF38vZmRFdnRbjn10D3wwo'); // Replace with your ID
            const [gids] = useState({
                reddit: '0', quora: '2027962453', youtube: '694205561', news: '143900986', medium: '1853488880'
            });
            const [allData, setAllData] = useState([]);
            const [loading, setLoading] = useState(false);
            const [activeTab, setActiveTab] = useState('Overview');
            const [healthStatus, setHealthStatus] = useState({});

            // 1. DATA FETCHING ENGINE (The "Sync")
            const syncData = async () => {
                setLoading(true);
                const health = {};
                let combined = [];

                const promises = Object.entries(gids).map(async ([key, gid]) => {
                    const url = `https://docs.google.com/spreadsheets/d/e/${sheetId}/pub?gid=${gid}&single=true&output=csv`;
                    try {
                        const res = await fetch(url);
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        const text = await res.text();
                        // Minimal CSV parser (you can integrate PapaParse here for more robust parsing)
                        const rows = text.split('\n').slice(1).map(row => {
                            const cols = row.split(',');
                            return { 
                                platform: key, 
                                summary: cols[1], 
                                sentiment: cols[3], 
                                link: cols[5],
                                rating: parseInt(cols[2]) || 0 
                            };
                        });
                        health[key] = { status: 'OK', rows: rows.length };
                        return rows;
                    } catch (e) {
                        health[key] = { status: 'ERROR', msg: e.message };
                        return [];
                    }
                });

                const results = await Promise.all(promises);
                setAllData(results.flat().filter(r => r.summary));
                setHealthStatus(health);
                setLoading(false);
                setTimeout(() => lucide.createIcons(), 100);
            };

            useEffect(() => { syncData(); }, []);

            // 2. INTELLIGENCE ENGINE (Calculates the North Star)
            const analytics = useMemo(() => {
                const total = allData.length || 1;
                const pos = allData.filter(r => r.sentiment?.toLowerCase().includes('pos')).length;
                const neg = allData.filter(r => r.sentiment?.toLowerCase().includes('neg')).length;
                const score = Math.round((pos / total) * 100);
                
                // Keyword extractor
                const keywords = allData.map(d => d.summary).join(' ').toLowerCase().split(' ')
                    .filter(w => w.length > 5).slice(0, 10);

                return { score, pos, neg, total, keywords };
            }, [allData]);

            return (
                <div className="flex min-h-screen">
                    {/* Sidebar */}
                    <aside className="w-64 border-r border-zinc-800 p-6 flex flex-col gap-8">
                        <div className="text-xl font-extrabold tracking-tighter italic">POLARIS <span className="text-yellow-500">v2</span></div>
                        <nav className="flex flex-col gap-2">
                            {['Overview', 'Intelligence', 'Roadmap', 'Settings'].map(t => (
                                <button 
                                    key={t} 
                                    onClick={() => setActiveTab(t)}
                                    className={`text-left px-4 py-3 rounded-lg text-sm font-medium transition ${activeTab === t ? 'sidebar-active text-white' : 'text-zinc-500 hover:bg-zinc-900'}`}
                                >
                                    {t}
                                </button>
                            ))}
                        </nav>
                        <div className="mt-auto p-4 glass rounded-xl text-[10px] text-zinc-500 uppercase tracking-widest font-bold">
                            Sync Status: {loading ? 'UPDATING...' : 'LIVE'}
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 p-10 overflow-y-auto">
                        
                        {/* 1. OVERVIEW (The North Star Focus) */}
                        {activeTab === 'Overview' && (
                            <div className="space-y-10">
                                <header className="flex justify-between items-center">
                                    <h2 className="text-3xl font-bold tracking-tight">Strategy Dashboard</h2>
                                    <button onClick={syncData} className="bg-yellow-500 text-black px-6 py-2 rounded-full text-sm font-bold shadow-lg shadow-yellow-500/10">Refresh Data</button>
                                </header>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <div className="lg:col-span-2 glass p-10 rounded-[2.5rem] gold-glow relative">
                                        <h3 className="text-zinc-500 text-xs font-bold uppercase tracking-widest">Brand Trust Score (North Star)</h3>
                                        <div className="text-[9rem] font-black leading-none mt-4 text-white tracking-tighter">{analytics.score}%</div>
                                        <p className="text-zinc-400 mt-4 max-w-sm">Calculated as (Positive Mentions / Total Volume) across all 5 integrated nodes.</p>
                                        <div className="mt-10 h-2 w-full bg-zinc-800 rounded-full overflow-hidden">
                                            <div className="h-full bg-yellow-500 transition-all duration-1000" style={{width: `${analytics.score}%`}}></div>
                                        </div>
                                    </div>

                                    <div className="space-y-6">
                                        <div className="glass p-6 rounded-2xl border-l-4 border-green-500">
                                            <span className="text-zinc-500 text-[10px] font-bold uppercase">Positive Reach</span>
                                            <p className="text-3xl font-bold">{analytics.pos}</p>
                                        </div>
                                        <div className="glass p-6 rounded-2xl border-l-4 border-red-500">
                                            <span className="text-zinc-500 text-[10px] font-bold uppercase">Risk Alerts</span>
                                            <p className="text-3xl font-bold">{analytics.neg}</p>
                                        </div>
                                        <div className="bg-zinc-900 p-6 rounded-2xl border border-yellow-500/30">
                                            <span className="text-yellow-500 text-[10px] font-bold uppercase flex items-center gap-2"><i data-lucide="zap" className="w-3 h-3"></i> Quick Action</span>
                                            <p className="text-sm font-medium mt-2">
                                                {analytics.score < 80 ? "Crisis Mode: Address Negative Quora/Reddit threads immediately." : "Healthy Growth: Generate 5-star reviews to keep momentum."}
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 2. INTELLIGENCE (The Sentiment/Keyword Section) */}
                        {activeTab === 'Intelligence' && (
                            <div className="space-y-8">
                                <h2 className="text-2xl font-bold italic text-yellow-500 uppercase tracking-widest">Analysis Engine</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="glass p-8 rounded-3xl">
                                        <h3 className="font-bold mb-6 text-sm uppercase tracking-widest">Keyword Trends</h3>
                                        <div className="flex flex-wrap gap-2">
                                            {analytics.keywords.map((k, i) => (
                                                <span key={i} className="px-4 py-2 bg-zinc-800 rounded-full text-xs font-medium border border-white/5 hover:border-yellow-500 transition cursor-default">#{k}</span>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="glass p-8 rounded-3xl bg-gradient-to-br from-zinc-900 to-black">
                                        <h3 className="font-bold mb-6 text-sm uppercase tracking-widest">Sentiment Mix</h3>
                                        <div className="flex h-12 w-full rounded-xl overflow-hidden border border-white/10">
                                            <div className="bg-green-500 h-full" style={{width: `${(analytics.pos/analytics.total)*100}%`}}></div>
                                            <div className="bg-red-500 h-full" style={{width: `${(analytics.neg/analytics.total)*100}%`}}></div>
                                        </div>
                                        <div className="flex justify-between mt-4 text-[10px] font-bold text-zinc-500 uppercase tracking-widest">
                                            <span>Green: Positive Index</span>
                                            <span>Red: Negative Risk</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 3. ROADMAP (Actionables + Live Links) */}
                        {activeTab === 'Roadmap' && (
                            <div className="glass rounded-[2rem] overflow-hidden">
                                <div className="p-8 border-b border-zinc-800 bg-white/5">
                                    <h3 className="font-bold text-xs uppercase tracking-widest">Strategic Verification Log</h3>
                                </div>
                                <table className="w-full text-left">
                                    <thead className="bg-black/50 text-[10px] font-bold text-zinc-500 uppercase">
                                        <tr>
                                            <th className="px-8 py-4">Node</th>
                                            <th className="px-8 py-4">Context / Review</th>
                                            <th className="px-8 py-4">Priority</th>
                                            <th className="px-8 py-4 text-right">Live Link</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-zinc-800/50">
                                        {allData.map((row, i) => (
                                            <tr key={i} className="hover:bg-white/[0.02] transition">
                                                <td className="px-8 py-6"><span className="text-[10px] font-bold px-2 py-1 rounded bg-zinc-800 text-zinc-400 uppercase tracking-tighter">{row.platform}</span></td>
                                                <td className="px-8 py-6 text-sm text-zinc-300 max-w-sm truncate">{row.summary}</td>
                                                <td className="px-8 py-6">
                                                    <span className={`text-[10px] font-bold ${row.sentiment?.includes('Neg') ? 'text-red-500' : 'text-green-500'}`}>
                                                        {row.sentiment?.includes('Neg') ? 'CRITICAL' : 'OPTIMAL'}
                                                    </span>
                                                </td>
                                                <td className="px-8 py-6 text-right">
                                                    <a href={row.link} target="_blank" className="text-yellow-500 hover:underline text-xs font-bold uppercase tracking-widest flex items-center justify-end gap-1">
                                                        VERIFY <i data-lucide="external-link" className="w-3 h-3"></i>
                                                    </a>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {/* 4. SETTINGS (Debugging GIDs) */}
                        {activeTab === 'Settings' && (
                            <div className="max-w-xl space-y-8">
                                <h2 className="text-2xl font-bold">System Configuration</h2>
                                <div className="space-y-4">
                                    <label className="text-[10px] font-bold text-zinc-500 uppercase">Master Sheet Publish ID</label>
                                    <input value={sheetId} onChange={(e) => setSheetId(e.target.value)} className="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-xl font-mono text-xs focus:border-yellow-500 outline-none transition" />
                                </div>
                                <div className="space-y-4">
                                    <label className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Node Health Status</label>
                                    <div className="grid grid-cols-1 gap-2">
                                        {Object.entries(healthStatus).map(([key, val]) => (
                                            <div key={key} className="p-4 glass rounded-xl flex justify-between items-center">
                                                <span className="text-xs font-bold uppercase text-zinc-400">{key}</span>
                                                <span className={`text-[10px] font-bold ${val.status === 'OK' ? 'text-green-500' : 'text-red-500'}`}>{val.status} ({val.rows || val.msg})</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
