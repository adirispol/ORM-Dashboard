<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORM INtellignence Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0D0D0D; color: #E8E8E8; }
        .glass-card { background: #181818; border: 1px solid #2E2E2E; border-radius: 1rem; }
        .north-star-gradient { background: linear-gradient(135deg, #FFCC3F 0%, #FF9A3F 100%); }
    </style>
</head>
<body class="p-6">

    <header class="max-w-7xl mx-auto flex justify-between items-center mb-8">
        <h1 class="text-2xl font-bold text-yellow-500">POLARIS <span class="text-white font-light text-sm opacity-50">/ ORM STRATEGY</span></h1>
        <div class="flex gap-4">
            <button onclick="fetchAllData()" class="bg-yellow-500 text-black px-4 py-2 rounded-lg font-bold text-xs hover:bg-yellow-400 transition">SYNC LIVE DATA</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto space-y-6">

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 glass-card p-8 flex flex-col justify-between relative overflow-hidden">
                <div class="relative z-10">
                    <h2 class="text-gray-400 text-xs uppercase tracking-widest font-semibold">Current North Star</h2>
                    <p class="text-6xl font-bold text-white mt-2" id="northStarValue">--%</p>
                    <p class="text-yellow-500 font-medium mt-1">Overall Brand Sentiment Index</p>
                </div>
                <div class="mt-8 z-10">
                    <div class="flex justify-between text-xs mb-2">
                        <span>Progress to Q4 Target (90%)</span>
                        <span id="targetPercent">0%</span>
                    </div>
                    <div class="w-full bg-gray-800 h-3 rounded-full">
                        <div id="targetBar" class="north-star-gradient h-full rounded-full transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>
                <div class="absolute -right-20 -top-20 w-64 h-64 bg-yellow-500/10 blur-[100px] rounded-full"></div>
            </div>

            <div class="glass-card p-6">
                <h3 class="text-gray-400 text-xs uppercase font-semibold mb-4">Platform Performance</h3>
                <canvas id="platformChart" height="200"></canvas>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="glass-card p-6">
                <h3 class="text-white font-bold mb-4 flex items-center gap-2">
                    <span class="text-yellow-500">●</span> Sentiment Analysis
                </h3>
                <div id="sentimentBreakdown" class="space-y-4">
                    <p class="text-gray-500 text-sm italic">Connect sheets to analyze keywords...</p>
                </div>
            </div>

            <div class="glass-card p-6">
                <h3 class="text-white font-bold mb-4 flex items-center gap-2">
                    <span class="text-blue-500">●</span> Top Mentioned Keywords
                </h3>
                <div id="keywordCloud" class="flex flex-wrap gap-2">
                    </div>
            </div>
        </div>

        <div class="glass-card overflow-hidden">
            <div class="p-6 border-b border-gray-800 bg-white/5">
                <h3 class="text-white font-bold">Strategy Roadmap & Live Links</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="text-xs text-gray-500 uppercase bg-black/20">
                        <tr>
                            <th class="p-4">Actionable Insight</th>
                            <th class="p-4">Priority</th>
                            <th class="p-4">Platform</th>
                            <th class="p-4">Live Link</th>
                        </tr>
                    </thead>
                    <tbody id="actionTableBody" class="text-sm divide-y divide-gray-800">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // Use your existing Sheet ID here
        const SHEET_ID = '1z2gTk-xw-RPgZ3BbiJBX3AF38vZmRFdnRbjn10D3wwo'; 
        
        // This simulates your fetching logic from the original index.html
        async function fetchAllData() {
            // In your real code, you'd loop through your GIDs like you did in Polaris
            // For now, I'm setting up the UI structure for the data
            updateDashboard({
                northStar: 78,
                sentiment: { pos: 70, neu: 20, neg: 10 },
                keywords: ['Pricing', 'Slow Support', 'Clean UI', 'Mobile App', 'Value'],
                actions: [
                    { task: "Address negative thread on Reddit regarding pricing", level: "High", platform: "Reddit", url: "https://reddit.com" },
                    { task: "Respond to Quora feedback on feature request", level: "Medium", platform: "Quora", url: "https://quora.com" }
                ]
            });
        }

        function updateDashboard(data) {
            // Update North Star
            document.getElementById('northStarValue').innerText = data.northStar + '%';
            document.getElementById('targetBar').style.width = data.northStar + '%';
            document.getElementById('targetPercent').innerText = data.northStar + '%';

            // Update Keywords
            const cloud = document.getElementById('keywordCloud');
            cloud.innerHTML = data.keywords.map(k => 
                `<span class="px-3 py-1 bg-gray-800 text-gray-300 rounded-full text-xs border border-gray-700">${k}</span>`
            ).join('');

            // Update Table
            const table = document.getElementById('actionTableBody');
            table.innerHTML = data.actions.map(a => `
                <tr class="hover:bg-white/5 transition">
                    <td class="p-4 text-gray-200 font-medium">${a.task}</td>
                    <td class="p-4">
                        <span class="px-2 py-0.5 rounded text-[10px] font-bold uppercase ${a.level === 'High' ? 'bg-red-500/20 text-red-500' : 'bg-blue-500/20 text-blue-500'}">
                            ${a.level}
                        </span>
                    </td>
                    <td class="p-4 text-gray-400">${a.platform}</td>
                    <td class="p-4"><a href="${a.url}" target="_blank" class="text-yellow-500 hover:underline">Verify Link ↗</a></td>
                </tr>
            `).join('');
        }

        // Initialize empty chart
        const ctx = document.getElementById('platformChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Reddit', 'Quora', 'YouTube', 'Medium'],
                datasets: [{
                    label: 'Score',
                    data: [65, 82, 45, 90],
                    backgroundColor: '#FFCC3F',
                    borderRadius: 5
                }]
            },
            options: {
                scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#666' } } },
                plugins: { legend: { display: false } }
            }
        });

        // Run fetch on load
        window.onload = fetchAllData;
    </script>
</body>
</html>
